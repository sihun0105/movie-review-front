services:
  frontend:
    image: ghcr.io/sihun0105/movie-review-front:latest
    container_name: frontend
    env_file:
      - ./.env.production
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    name: app-network
    external: true
