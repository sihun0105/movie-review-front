name: Deploy Frontend to Production

on:
  push:
    branches:
      - develop

env:
  IMAGE: ghcr.io/sihun0105/movie-review-front

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Docker 이미지 빌드 & GHCR push
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SERVER_API=${{ secrets.NEXT_PUBLIC_SERVER_API }}
            NEXT_PUBLIC_CHAT_SERVER_API=${{ secrets.NEXT_PUBLIC_CHAT_SERVER_API }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Job 2: 서버에 배포 (빌드 완료 후 실행)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: GHCR_TOKEN,GITHUB_ACTOR
          script: |
            set -e

            echo "▶ GHCR 로그인"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            echo "▶ 최신 이미지 Pull"
            cd /app/movie
            docker compose -f docker-compose.yml pull frontend

            echo "▶ 프론트엔드 재시작"
            docker compose -f docker-compose.yml up -d frontend

            echo "▶ 미사용 이미지 정리"
            docker image prune -f

            echo "✅ 프론트엔드 배포 완료"
